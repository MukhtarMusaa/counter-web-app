<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="counter.css">
</head>
<body>

    <div class="container">

        <h1>Counter App</h1>

        <div id="mydisplay">0</div>

        <div class="all-btns">
            <button class="mybtn increase" id="myincrease">
                Increase
            </button>

            <button class="mybtn decrease" id="mydecrease">
                Decrease
            </button>

            <button class="mybtn reset" id="reset">
                Reset
            </button>
        </div>

    </div>

    <script src="counter.js"></script>
</body>
</html>
